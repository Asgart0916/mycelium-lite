<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mycelium-lite</title>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>mycelium<span class="dot">·</span>lite</h1>
        <p class="tagline">逐字稿 → 積木牆 + 概念分布，照見你的盲點</p>
      </header>

      <section class="composer">
        <label class="field-label">① 逐字稿（可選，貼了才驗 source_quote 可追溯）</label>
        <textarea id="transcript-input" rows="3" placeholder="把這次 brainstorm 的逐字稿貼這裡…"></textarea>

        <label class="field-label">② ChatGPT 回填的 JSON</label>
        <textarea id="json-input" rows="6" placeholder='貼上 ChatGPT 一次往返回填的 JSON（容錯：```json 包裹、前後贅字都能解析）。Ctrl+Enter 解析'></textarea>

        <div class="composer-actions">
          <span id="status" class="status"></span>
          <button id="parse-btn">解析積木牆</button>
        </div>
      </section>

      <main id="output"></main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
